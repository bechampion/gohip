name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Test
        run: |
          make test

  tag:
    runs-on: ubuntu-latest
    needs: [build]
    # Only auto-tag on direct pushes to main, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # full history so git describe works

      - name: Bump patch version and push tag
        run: |
          # Get the latest semver tag; default to v0.0.0 if none exists
          LATEST=$(git tag --list 'v*.*.*' --sort=-version:refname | head -n1)
          LATEST=${LATEST:-v0.0.0}
          echo "Latest tag: $LATEST"

          # Strip the leading 'v' and split into parts
          VERSION=${LATEST#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)

          # Bump patch
          NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "New tag: $NEW_TAG"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
